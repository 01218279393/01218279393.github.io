<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민지 개발 블로그</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3f);
            color: #fff;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 레이아웃 */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        /* 사이드바 */
        .sidebar {
            background: rgba(30, 30, 50, 0.95);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 2px solid #ff6a00;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff6a00;
            margin-bottom: 15px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .profile-pic:hover {
            transform: scale(1.1);
        }

        .intro {
            text-align: center;
        }

        .intro h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            margin: 10px 0 5px;
            color: #ff6a00;
        }

        .intro p {
            font-size: 14px;
            color: #ccc;
        }

        /* 게시글 영역 */
        .main-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .post {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-left: 5px solid #ff6a00;
            border-radius: 8px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .post:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 106, 0, 0.3);
        }

        .post h2 {
            font-family: 'JetBrains Mono', monospace;
            color: #ff6a00;
            margin-bottom: 10px;
        }

        .post p {
            color: #ddd;
            line-height: 1.5;
        }

        /* 화려한 애니메이션 요소 */
        .glow {
            text-shadow: 0 0 5px #ff6a00, 0 0 10px #ff6a00, 0 0 20px #ff6a00;
        }

        /* 스크롤바 스타일 */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6a00;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <img src="profile.jpg" alt="민지 프로필" class="profile-pic">
            <div class="intro">
                <h1 class="glow">민지 개발자</h1>
                <p>프론트엔드 & 백엔드 개발을 좋아하는 블로거.<br>
                최신 기술과 프로젝트 경험을 공유합니다.</p>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <div class="post">
                <h2>React 프로젝트 시작하기</h2>
                <p>React를 사용한 간단한 프로젝트 예제를 만들고 컴포넌트 구조를 설계하는 방법에 대해 공유합니다.</p>
            </div>
            <div class="post">
                <h2>CSS 애니메이션으로 인터랙티브 UI 만들기</h2>
                <p>Hover 효과와 keyframe 애니메이션을 사용해 사용자 경험을 개선하는 방법을 다룹니다.</p>
            </div>
            <div class="post">
                <h2>Node.js로 간단한 API 구축</h2>
                <p>Express와 MongoDB를 사용하여 CRUD API를 빠르게 구축하는 실습 예제를 설명합니다.</p>
            </div>
        </main>
    </div>
</body>
</html>
